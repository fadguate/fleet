  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#D8D2C2;border-radius:4px;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:6px;padding:9px 14px;font-size:14px;font-weight:600;transition:filter .15s;}
  .btn:hover{filter:brightness(0.94);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn-primary{background:var(--ink);color:#fff;}
  .btn-accent{background:var(--green);color:#fff;}
  .btn-danger{background:var(--red);color:#fff;}
  .btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--border);}

  .card{background:#fff;border:1px solid var(--border);border-radius:12px;}
  .input{width:100%;border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:14px;outline:none;}
  .input:focus{border-color:var(--ink);box-shadow:0 0 0 2px rgba(28,35,51,0.12);}
  .icon-btn{background:none;border:none;padding:6px;border-radius:6px;display:inline-flex;}
  .icon-btn:hover{background:#f2f2ef;}
  .icon-btn-danger:hover{background:var(--red-soft);}

  .day-available{background:var(--green-soft);color:var(--green);border-color:var(--green);}
  .day-occupied{background:var(--amber-soft);color:#8A6A20;border-color:var(--amber);}
  .day-fullday{background:var(--red-soft);color:var(--red);border-color:var(--red);}
  .day-maintenance{background:var(--blue-soft);color:var(--blue);border-color:var(--blue);}

  .pill-neutral{background:#EFEBE1;color:var(--ink);}
  .pill-green{background:var(--green-soft);color:var(--green);}
  .pill-red{background:var(--red-soft);color:var(--red);}
  .pill-amber{background:var(--amber-soft);color:#8A6A20;}
  .pill-blue{background:var(--blue-soft);color:var(--blue);}

  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}

  .field-label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:#6B7280;margin-bottom:4px;}

  .app-layout{min-height:100vh;display:flex;flex-direction:column;}
  .main{flex:1;padding:24px;overflow-y:auto;}

  .topbar{background:var(--ink);color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
  .topbar-brand{display:flex;align-items:center;gap:10px;}
  .topbar-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .topbar-btn{background:#E4D7AE;color:var(--ink);border:1px solid #DCCFA3;border-radius:999px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}

  .topbar-user span{color:#C9A24B;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.04em;}
  .topbar-about{background:none;border:none;color:#B7BDCC;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;}

  .tabbar{display:flex;gap:8px;padding:12px 20px;background:#EDE3CC;overflow-x:auto;}
  .subtabbar{display:flex;gap:8px;padding:0 20px 14px;background:#EDE3CC;overflow-x:auto;}
  .tab-pill{flex-shrink:0;display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:999px;background:#E4D7AE;color:var(--ink);font-weight:700;font-size:13px;border:1px solid #DCCFA3;cursor:pointer;white-space:nowrap;}

  .sub-pill{flex-shrink:0;padding:8px 16px;border-radius:999px;background:#E4D7AE;color:var(--ink);font-weight:600;font-size:12.5px;border:1px solid #DCCFA3;cursor:pointer;white-space:nowrap;}
  .sub-pill.active{background:var(--ink);color:#fff;border-color:var(--ink);}

  .grid-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .weekday{text-align:center;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#8A8574;padding:4px 0;}

  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
  .layout-2col{display:grid;grid-template-columns:2fr 1fr;gap:20px;}
  .layout-2col-even{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  .layout-3col{display:grid;grid-template-columns:2fr 1fr;gap:20px;}
  @media (max-width:880px){
    .grid-3{grid-template-columns:1fr;}
    .layout-2col,.layout-2col-even,.layout-3col{grid-template-columns:1fr;}
  }

  .ticket-box{border:2px dashed var(--ink);border-radius:8px;padding:16px;margin-bottom:16px;}
  .ticket-row{display:flex;justify-content:space-between;font-size:14px;padding:2px 0;}

  .bar-wrap{display:flex;align-items:flex-end;gap:14px;height:220px;padding:10px 4px 0;}
  .bar-col{display:flex;flex-direction:column;align-items:center;flex:1;}
  .bar{width:60%;border-radius:4px 4px 0 0;min-height:2px;background:var(--green);}

    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;
    background-color:#E6DAB8;
    background-image:radial-gradient(rgba(28,35,51,0.05) 1px, transparent 1px);

  .login-card{
    position:relative;background:#F6EFDC;border:1px solid #DCCFA3;border-radius:14px;
    padding:28px 24px 24px;box-shadow:0 10px 30px rgba(28,35,51,0.12);overflow:hidden;
  }

    content:"";position:absolute;top:0;left:24px;width:36px;height:14px;background:var(--amber);
    clip-path:polygon(0 0,100% 0,72% 100%,28% 100%);

  .login-eyebrow{color:var(--amber);font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;margin-bottom:6px;}
  .login-title{font-family:"Playfair Display",Georgia,serif;font-weight:800;font-size:28px;color:var(--ink);line-height:1.15;margin:0 0 8px;}
  .login-subtitle{font-size:13px;color:#6B7280;margin:0 0 20px;}
  .login-field-label{display:block;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#8A7B5C;margin-bottom:6px;}
  .login-input{width:100%;border:1px solid #DCCFA3;border-radius:8px;padding:11px 12px;font-size:14px;background:#fff;outline:none;}
  .login-input:focus{border-color:var(--ink);box-shadow:0 0 0 2px rgba(28,35,51,0.1);}
  .login-btn-primary{width:100%;border:none;border-radius:8px;padding:13px;font-size:15px;font-weight:700;color:#fff;background:var(--green);cursor:pointer;}
  .login-btn-secondary{width:100%;border:1px solid #DCCFA3;border-radius:8px;padding:12px;font-size:13px;font-weight:700;color:var(--ink);background:#E4D7AE;cursor:pointer;margin-top:10px;}
  .login-info-box{margin-top:18px;border:1.5px dashed #9DB3AC;border-radius:8px;padding:12px 14px;background:#E8EFEC;color:#3E5952;font-size:12px;line-height:1.6;}
</style>
</head>

<script>
"use strict";

const INK = "#1C2333", GREEN = "#2E5339", RED = "#DC2626", AMBER = "#C9A24B", BLUE = "#1D4ED8";
const PIE_COLORS = [GREEN, AMBER, RED, "#4C6E8C", "#8C5E4C", "#6E4C8C"];
const VEHICLE_TYPES = ["Sedán", "Camioneta", "Van", "Motocicleta", "Camión"];

const uid = (p = "id") => `${p}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 7)}`;
function genReservationCode(existingIds) {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    let code;
    do {
        code = "";
        for (let i = 0; i < 7; i++)
            code += chars[Math.floor(Math.random() * chars.length)];

// ---------- Supabase ----------
const supabaseClient = (window.supabase && window.SUPABASE_URL && window.SUPABASE_ANON_KEY)

function vehicleFromRow(row) {

function maintenanceFromRow(row) {

// ---------- Helpers ----------
function dateTime(dateStr, timeStr) { return new Date(`${dateStr}T${timeStr}:00`); }
function reservationsOverlap(a, b) {

    const bS = dateTime(b.startDate, b.startTime), bE = dateTime(b.endDate, b.endTime);
    return aS < bE && bS < aE;

function isDayInRange(dateStr, startDate, endDate) { return dateStr >= startDate && dateStr <= endDate; }
function formatPretty(dateStr) {
    const d = new Date(dateStr + "T00:00:00");
    return d.toLocaleDateString("es-ES", { day: "numeric", month: "short", year: "numeric" });
}
function formatDateTime(isoStr) {
    if (!isoStr)
        return "";
    const d = new Date(isoStr);
    return d.toLocaleDateString("es-ES", { day: "numeric", month: "short", year: "numeric" }) + " · " + d.toLocaleTimeString("es-ES", { hour: "2-digit", minute: "2-digit" });

function buildReservationRow(r, vehicles) {
    const v = vehicles.find(veh => veh.id === r.vehicleId);
    const lic = licenseStatus(r.licenseExpiry);
    return {
        "Tipo de evento": "Reserva",

}
function buildMaintenanceRow(b, vehicles) {
    const v = vehicles.find(veh => veh.id === b.vehicleId);
    return {
        "Tipo de evento": "Mantenimiento",
        "Placa": v ? v.plate : "(auto eliminado)",

function buildHistoryRows(reservations, maintenanceBlocks, vehicles) {
    const rows = [
        ...reservations.map(r => buildReservationRow(r, vehicles)),

function exportRowsToExcel(rows, filename, sheetName) {
    try {
        if (typeof XLSX === "undefined") {

function printHTML(bodyHtml, title) {
    try {
        let iframe = document.getElementById("print-iframe");
        if (!iframe) {
            iframe = document.createElement("iframe");
